<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>حلازون | نظام عروض الأسعار</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8872A;--gold-l:#F5E6D0;--gold-d:#9B6520;
  --navy:#1B2A45;--navy-l:#243454;
  --bg:#F7F5F2;--card:#FFFFFF;--card2:#FAFAFA;
  --border:#E5E0D8;--border2:#D4C9B8;
  --text:#1A1A2E;--text2:#5A6478;--text3:#9AA3B2;
  --green:#166534;--green-l:#DCFCE7;
  --red:#991B1B;--red-l:#FEE2E2;
  --blue:#1D4ED8;--blue-l:#DBEAFE;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --radius:10px;--radius-lg:14px;
}
body{font-family:'Cairo',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
input,select,textarea{font-family:'Cairo',Arial,sans-serif;direction:rtl;font-size:14px;outline:none;-webkit-appearance:none;appearance:none}
input::placeholder,textarea::placeholder{color:var(--text3)}
button{font-family:'Cairo',Arial,sans-serif;cursor:pointer;border:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── NAV ── */
.nav{background:var(--navy);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.nav-top{padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-wrap img{height:36px;object-fit:contain;filter:brightness(0) invert(1)}
.nav-user{display:flex;align-items:center;gap:8px}
.nav-name{color:rgba(255,255,255,0.85);font-size:12px;font-weight:600}
.nav-role{color:rgba(255,255,255,0.5);font-size:10px}
.nav-tabs{display:flex;overflow-x:auto;padding:0;border-top:1px solid rgba(255,255,255,0.08);WebkitOverflowScrolling:touch}
.nav-tab{padding:11px 14px;background:transparent;color:rgba(255,255,255,0.55);border:none;border-bottom:3px solid transparent;font-size:12px;white-space:nowrap;cursor:pointer;font-family:'Cairo',Arial,sans-serif;font-weight:500;transition:all .2s}
.nav-tab:hover{color:rgba(255,255,255,0.9)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}

/* ── BUTTONS ── */
.btn{border:none;border-radius:var(--radius);font-family:'Cairo',Arial,sans-serif;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:var(--gold);color:#fff;padding:11px 20px;font-size:14px}
.btn-primary:hover{background:var(--gold-d)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border2);padding:9px 16px;font-size:13px}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid #FECACA;padding:9px 16px;font-size:13px}
.btn-success{background:var(--green-l);color:var(--green);border:1px solid #BBF7D0;padding:9px 16px;font-size:13px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.card-gold{border-color:var(--gold-l);background:linear-gradient(135deg,#FFFAF5,#FFF7EE)}

/* ── INPUTS ── */
.inp{background:var(--bg);border:1.5px solid var(--border);color:var(--text);border-radius:var(--radius);padding:11px 14px;width:100%;font-size:14px;font-family:'Cairo',Arial,sans-serif;transition:border-color .2s}
.inp:focus{border-color:var(--gold);background:#fff}
.inp-label{font-size:11px;color:var(--text2);font-weight:600;display:block;margin-bottom:5px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-sent{background:var(--blue-l);color:var(--blue)}
.badge-confirmed{background:var(--green-l);color:var(--green)}
.badge-uploaded{background:#F3E8FF;color:#6B21A8}
.badge-cancelled{background:var(--red-l);color:var(--red)}
.badge-sale{background:#FEF3C7;color:#92400E}
.badge-outofstock{background:#F1F5F9;color:#475569}

/* ── PRODUCT CARD ── */
.prod-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
.prod-card:hover{border-color:var(--gold);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.prod-card.selected{border-color:var(--gold);background:linear-gradient(135deg,#FFFAF5,#FFF7EE)}
.prod-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--card2)}
.prod-img-placeholder{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--gold-l),#FFF0DC);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold)}
.prod-body{padding:10px}
.prod-brand{font-size:10px;color:var(--gold-d);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.prod-name{font-size:13px;color:var(--text);font-weight:700;line-height:1.3;margin-bottom:6px}
.prod-price{font-size:14px;color:var(--navy);font-weight:800}
.prod-price-old{font-size:11px;color:var(--text3);text-decoration:line-through;margin-right:5px}
.prod-sale-price{font-size:14px;color:var(--red);font-weight:800}

/* ── LEADERBOARD ── */
.lb-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px}
.lb-rank{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.lb-avatar{width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;color:var(--text)}
.lb-count{font-size:12px;color:var(--text2)}
.lb-bar-wrap{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.lb-bar{height:100%;background:var(--gold);border-radius:3px;transition:width .8s ease}

/* ── PAGE ── */
.page{padding:16px;max-width:720px;margin:0 auto;padding-bottom:50px}
.page-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:16px}
.hidden{display:none!important}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* ── STAT CARD ── */
.stat{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 12px;text-align:center}
.stat-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1.1;margin-bottom:2px}
.stat-label{font-size:11px;color:var(--text2);font-weight:600}

/* ── QUOTE ITEMS ── */
.q-item{padding:10px 0;border-bottom:1px solid var(--border)}
.q-item:last-child{border-bottom:none}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--navy)}
.login-box{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{height:56px;object-fit:contain;margin-bottom:12px}
.login-logo h2{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:4px}
.login-logo p{font-size:12px;color:var(--text2)}

/* ── TOAST ── */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── QUOTE CARD ── */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;transition:all .2s}
.qcard:hover{border-color:var(--gold);box-shadow:var(--shadow)}
.qcard-id{font-size:15px;font-weight:800;color:var(--gold-d)}
.qcard-cust{font-size:13px;font-weight:600;color:var(--text)}
.qcard-meta{font-size:11px;color:var(--text2)}

/* ── PROD GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:400px){.prod-grid{grid-template-columns:repeat(2,1fr)}}

/* ── SELECTED ITEM ── */
.sel-item{background:linear-gradient(135deg,#FFFAF5,#FFF7EE);border:1.5px solid var(--gold-l);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.sel-item-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.sel-img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--border);flex-shrink:0}
.sel-img-ph{width:48px;height:48px;border-radius:8px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sel-info{flex:1;min-width:0}
.sel-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.sel-brand{font-size:10px;color:var(--gold-d);font-weight:600}
.sel-remove{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1;padding:2px}
.sel-remove:hover{color:var(--red)}
.sel-controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sel-ctrl-label{font-size:10px;color:var(--text2);font-weight:600;margin-bottom:4px}
.sel-total{text-align:left;font-size:13px;font-weight:800;color:var(--gold-d);margin-top:6px}

/* ── TOGGLE ── */
.toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:30px;padding:3px;gap:2px}
.toggle-btn{padding:6px 14px;border-radius:25px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'Cairo',Arial,sans-serif;color:var(--text2);background:transparent;transition:all .2s}
.toggle-btn.active{background:var(--navy);color:#fff}

/* ── INVOICE PREVIEW ── */
.inv-color-pick{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.inv-color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.inv-color-swatch.active{border-color:var(--text) !important;transform:scale(1.1)}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0];}
function nowISO(){return new Date().toISOString();}
function fmtD(s){if(!s)return'';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function addDaysDate(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function toast(msg,ok=true){var t=document.getElementById('toast');t.textContent=msg;t.style.background=ok?'#166534':'#991B1B';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function qs(sel){return document.querySelector(sel);}
function el(id){return document.getElementById(id);}
function pad(n,l=3){return String(n).padStart(l,'0');}

function calcItem(it){
  var base=it.prod?((it.prod.salePrice||it.prod.price)||0):(it.price||0);
  var fp=it.disc>0?base*(1-it.disc/100):base;
  return Object.assign({},it,{fp:fp,lt:it.qty*fp});
}
function grandTotal(items){return items.reduce((s,i)=>s+calcItem(i).lt,0);}

// ── AUTH ──────────────────────────────────────────────────
function togglePwVis(){var i=el('l-pw');i.type=i.type==='password'?'text':'password';}
el('l-un').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
el('l-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  var un=el('l-un').value.trim();
  var pw=el('l-pw').value;
  el('l-err').classList.add('hidden');
  // Check default IU first (always works)
  var u=IU.find(x=>x.un===un&&x.pw===pw);
  // Then try Firebase users
  if(!u){
    var dbUsers=await fb('hz4_u',null);
    if(dbUsers&&typeof dbUsers==='object'){
      var arr=Array.isArray(dbUsers)?dbUsers:Object.values(dbUsers);
      u=arr.find(x=>x.un===un&&x.pw===pw);
    }
  }
  if(!u){el('l-err').classList.remove('hidden');return;}
  CU=u;
  el('loginPage').classList.add('hidden');
  el('appWrap').classList.remove('hidden');
  el('navName').textContent=u.name;
  el('navRole').textContent=(ROLES[u.role]||{lbl:u.role}).lbl;
  await loadAll();
  buildNavTabs();
  navigate('dash');
  refreshTimer=setInterval(()=>{loadAll(true);},20000);
}

function doLogout(){
  clearInterval(refreshTimer);CU=null;
  el('appWrap').classList.add('hidden');
  el('loginPage').classList.remove('hidden');
  el('l-pw').value='';
}

async function loadAll(bg){
  var[dbP,dbQ,dbU,dbS,dbSt,dbB]=await Promise.all([
    fb('hz4_p3',null),fb('hz4_q3',[]),
    fb('hz4_u',IU),fb('hz4_s1',DEF_SETT),fb('hz4_stats',{}),fb('hz4_bundles',[])
  ]);
  // Products: use Firebase if it has data, else init from IP
  if(dbP&&typeof dbP==='object'&&Object.keys(dbP).length>0){
    var arr=Array.isArray(dbP)?dbP:Object.values(dbP);
    // If Firebase has real products (has name field), use them
    if(arr[0]&&arr[0].name){
      prods=arr;
    } else {
      // It's the old overrides format — migrate to full array
      prods=IP.map(function(ip){return Object.assign({},ip);});
      fbSet('hz4_p3',prods); // Save full array
    }
  } else {
    // First time — init from IP and save to Firebase
    prods=IP.map(function(ip){return Object.assign({},ip);});
    fbSet('hz4_p3',prods);
  }
  quotes=Array.isArray(dbQ)?dbQ:Object.values(dbQ||{});
  users=Array.isArray(dbU)?dbU:Object.values(dbU||IU);
  sett={...DEF_SETT,...dbS};
  stats=dbSt||{};
  bundles=Array.isArray(dbB)?dbB:Object.values(dbB||{});
  // Re-render current page
  if(curPage&&!(bg&&['newq','bundles','products','inv','users','settings'].includes(curPage)))renderPage(curPage);
}

async function saveQuotes(q){

}

function buildNavTabs(){
  var tabs=(ROLES[CU.role]||{tabs:['dash']}).tabs;
  el('navTabs').innerHTML=tabs.map(t=>
    `<button type="button" class="nav-tab" data-tab="${t}" onclick="navigate('${t}')">${TAB_LABELS[t]||t}</button>`
  ).join('');
}

function navigate(page){
  // Validate page is accessible for this role
  var tabs=(ROLES[CU?CU.role:'sales']||{tabs:['dash']}).tabs;
  if(!['qdetail','profile'].includes(page)&&!tabs.includes(page)){
    page='dash';
  }
  curPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.tab===page);
  });
  var pg=el('pg-'+page);
  if(pg){pg.classList.remove('hidden');pg.classList.add('fade-in');}
  renderPage(page);
}

function renderPage(page){
  switch(page){
    case 'dash':     renderDash();break;
    case 'newq':     renderNewQ();break;
    case 'quotes':   renderQuotesList(false);break;
    case 'myq':      renderQuotesList(true);break;
    case 'products': renderProducts();break;
    case 'inv':      renderInvManagement();break;
    case 'users':    renderUsers();break;
    case 'settings': renderSettings();break;
    case 'board':    renderBoard();break;
    case 'bundles':  renderBundles();break;
    case 'qdetail':  renderQDetail();break;
    case 'profile':  renderProfile();break;
  }
}

function getTopRep(){

  return u?{name:u.name,count:max}:null;
}

        </div>

          p.qty>0?`<div style="margin-top:3px;font-size:10px;color:var(--green)">متوفر (${p.qty})</div>`:
          `<div style="margin-top:3px;font-size:10px;color:var(--text3)">يُحدَّد المخزون</div>`}
        ${(()=>{var mb=bundles.find(function(b){return b.active&&b.productId===p.id;});
          return mb?`<div style="margin-top:4px;background:#D1FAE5;color:#065F46;font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;display:inline-block">🎁 اشترِ ${mb.buyQty} + ${mb.freeQty} مجاناً</div>`:

function filterProds(q){
  var all=prods.filter(function(p){return p.active;});
  var g=el('nq-prod-grid');
  if(g)g.innerHTML=renderProdGrid(all,q||'');
}

function calcFree(p,qty){
  if(!p.promoRule)return 0;
  return Math.floor(qty/p.promoRule.buyQty)*p.promoRule.freeQty;
}
function toggleCart(pid){
  var p=prods.find(x=>x.id===pid);if(!p)return;
  // Block only if inStock is explicitly false (on-demand products are always allowed)
  // Note: qty=0 products CAN be quoted - warehouse manages actual stock separately
  var idx=cartItems.findIndex(i=>i.prod.id===pid);
  if(idx>=0){
    cartItems.splice(idx,1);
  } else {
    // Default qty = minimum buy qty if promo rule exists
    // Always start from 1 — promo applied when qty reaches threshold
    cartItems.push({prod:p,qty:1,disc:0,free:0});
  }
  el('nq-cart-wrap').innerHTML=renderCartHTML();
  var srch=el('nq-srch');
  var q=srch?srch.value:'';
  var allActive=prods.filter(function(p){return p.active;});
  var grid=el('nq-prod-grid');
  if(grid)grid.innerHTML=renderProdGrid(allActive,q);
}

function removeFromCart(idx){
  cartItems.splice(idx,1);
  el('nq-cart-wrap').innerHTML=renderCartHTML();
  var srch=el('nq-srch');
  var q=srch?srch.value:'';
  var allActive=prods.filter(function(p){return p.active;});
  var grid=el('nq-prod-grid');
  if(grid)grid.innerHTML=renderProdGrid(allActive,q);
}

function updateCart(idx,field,val){
  if(field==='qty'){
    var qty=Math.max(1,parseInt(val)||1);
    var prod=cartItems[idx].prod;
    // Enforce stock limit
    if(prod.inStock!==false&&(prod.qty||0)>0&&qty>(prod.qty||0)){
      qty=prod.qty;
      toast('الحد الأقصى المتاح: '+(prod.qty||0)+' قطعة',false);
    }
    cartItems[idx].qty=qty;
    // Auto-calculate free based on bundle or promoRule
    // Only if user hasn't manually changed free field
    var matchB=bundles.find(function(b){return b.active&&b.productId===prod.id;});
    if(matchB){
      // Bundle: free = floor(qty/buyQty) * freeQty, 0 if below threshold
      cartItems[idx].free=qty>=matchB.buyQty?Math.floor(qty/matchB.buyQty)*matchB.freeQty:0;
      if(qty===matchB.buyQty) toast(matchB.name+' — تم تطبيق '+matchB.freeQty+' مجاناً');
    } else if(prod.promoRule){
      cartItems[idx].free=calcFree(prod,qty);
    }
  }
  if(field==='disc')cartItems[idx].disc=Math.min(100,Math.max(0,parseInt(val)||0));
  if(field==='free')cartItems[idx].free=Math.max(0,parseInt(val)||0);
  el('nq-cart-wrap').innerHTML=renderCartHTML();
  var srch=el('nq-srch');var q=srch?srch.value:'';
  var g=el('nq-prod-grid');
  if(g)g.innerHTML=renderProdGrid(prods.filter(function(p){return p.active;}),q);
}

function getDel(){
  var r=document.querySelector('input[name="nq-del"]:checked');
  var v=r?r.value:'no';
  var p=v==='yes'?parseFloat(el('nq-del-price')?.value)||0:0;

function clearCart(){

      price:+(i.prod.salePrice||i.prod.price||0),img:i.prod.img||null,

  var newQ=quotes.map(q=>{

function renderQuotesList(myOnly){
  var base=myOnly?quotes.filter(q=>q.repId===CU.id):quotes;
  var sorted=[...base].sort((a,b)=>b.ts-a.ts);
  var pg=el(myOnly?'pg-myq':'pg-quotes');
  pg.innerHTML=`
  <div class="page-title">${myOnly?'عروضي':'جميع العروض'} <span style="font-size:13px;color:var(--text2);font-weight:400">(${base.length})</span></div>
  <input class="inp" id="q-srch" placeholder="بحث بالعميل أو رقم العرض..." style="margin-bottom:12px" oninput="filterQuotes(this.value,'${myOnly}')">
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="q-filters">
    ${['all','sent','confirmed','uploaded','cancelled'].map(s=>`<button type="button" class="btn btn-ghost btn-sm" style="border-radius:20px;font-size:11px" data-sf="${s}" onclick="filterQuotesByStatus('${s}','${myOnly}')">${s==='all'?'الكل':STATUS[s]?.l||s} (${s==='all'?base.length:base.filter(q=>q.status===s).length})</button>`).join('')}
  </div>
  <div id="q-list">${renderQList(sorted)}</div>`;
}

function renderQList(qs){
  if(!qs.length)return`<div style="text-align:center;padding:40px;color:var(--text2);font-size:13px">لا توجد عروض</div>`;
  return qs.map(q=>`<div class="qcard" onclick="openQ('${q.qid}')">
    <div style="min-width:0;flex:1">
      <div class="qcard-id">${q.qid}</div>
      <div class="qcard-cust">${q.customer}</div>
      <div class="qcard-meta">${q.repName} · ${q.items.length} منتج · ${q.date}${q.validDays?` · ${q.validDays}ي`:''}</div>
    </div>
    <span class="badge ${STATUS[q.status]?.cl||'badge-sent'}">${STATUS[q.status]?.l||q.status}</span>
  </div>`).join('');
}

function filterQuotes(srch,myOnly){
  var base=myOnly==='true'?quotes.filter(q=>q.repId===CU.id):quotes;
  var filtered=srch?base.filter(q=>q.customer.includes(srch)||q.qid.includes(srch)):base;
  el('q-list').innerHTML=renderQList([...filtered].sort((a,b)=>b.ts-a.ts));
}

function filterQuotesByStatus(status,myOnly){
  document.querySelectorAll('[data-sf]').forEach(b=>{
    b.style.background=b.dataset.sf===status?'var(--navy)':'';
    b.style.color=b.dataset.sf===status?'#fff':'';
  });
  var base=myOnly==='true'?quotes.filter(q=>q.repId===CU.id):quotes;
  var filtered=status==='all'?base:base.filter(q=>q.status===status);
  el('q-list').innerHTML=renderQList([...filtered].sort((a,b)=>b.ts-a.ts));
}

function addExpiryDate(dateStr,days){
  var d=new Date(dateStr);d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];
}

function startEdit(qid){

  cartItems=q.items.map(i=>({
    prod:prods.find(p=>p.id===i.id)||{...i,active:true},
    qty:i.qty,disc:i.discountPct||0,free:i.freeQty||0
  }));
  navigate('newq');
  setTimeout(()=>renderNewQ(q),100);
}

async function updateStatus(qid,st){
  var nq=quotes.map(q=>q.qid===qid?{...q,status:st}:q);

  selQ=nq.find(q=>q.qid===qid);
  toast(st==='confirmed'?'تم التأكيد ✓':st==='uploaded'?'تم الرفع':st==='cancelled'?'تم الإلغاء':'تم التحديث');
  renderQDetail();
}

    <button type="button" class="toggle-btn active" onclick="switchProdView('active',this)">نشط (${active.length})</button>

var prodView='active';
function switchProdView(v,btn){
  prodView=v;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b===btn));
  var list=v==='active'?prods.filter(p=>p.active):prods.filter(p=>!p.active);
  el('prod-list').innerHTML=renderProdMgmtList(list);
}

function filterProdPage(q){
  var list=prodView==='active'?prods.filter(p=>p.active):prods.filter(p=>!p.active);
  var filtered=q?list.filter(p=>p.name.includes(q)||p.brand.includes(q)):list;
  el('prod-list').innerHTML=renderProdMgmtList(filtered);
}

function renderProdMgmtList(list){
  if(!list.length)return`<div style="text-align:center;padding:30px;color:var(--text2)">لا توجد منتجات</div>`;
  return list.map(p=>{
    var price=p.salePrice?`<span style="text-decoration:line-through;color:var(--text3);font-size:11px">${p.price}</span> <span style="color:var(--red);font-weight:700">${p.salePrice}</span>`:p.price?`${p.price}`:'-';
    return`<div class="card" style="padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
      ${p.img?`<img src="${p.img}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display=\x27none\x27">`:
       `<div style="width:48px;height:48px;border-radius:8px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🍬</div>`}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:var(--text)">${p.name}</div>
        <div style="font-size:11px;color:var(--gold-d);font-weight:600">${p.brand} · ${price} ريال</div>
        ${!p.inStock?`<span class="badge badge-outofstock" style="margin-top:3px">طلب خاص</span>`:''}
        ${p.promoRule?`<div style="font-size:10px;color:var(--green);font-weight:700;margin-top:2px">🎁 ${p.promoRule.buyQty}+${p.promoRule.freeQty} مجاناً</div>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button type="button" class="btn btn-ghost btn-sm" onclick="editProdInline('${p.id}')">تعديل</button>
        <button type="button" class="btn ${p.active?'btn-danger':'btn-success'} btn-sm" onclick="archiveProd('${p.id}')">${p.active?'أرشفة':'استعادة'}</button>
        ${!p.active?`<button type="button" class="btn btn-danger btn-sm" onclick="deleteProd('${p.id}')">حذف</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function handleNewProdImg(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    el('np-img').value='';
    el('np-img')._b64=ev.target.result;
    var prev=el('np-img-preview');
    prev.style.backgroundImage='url('+ev.target.result+')';
    prev.style.backgroundSize='cover';
    prev.textContent='';
  };
  r.readAsDataURL(f);
}
el('np-img')&&(el('np-img').addEventListener('input',function(){
  if(this.value){
    var prev=el('np-img-preview');
    prev.style.backgroundImage='url('+this.value+')';prev.style.backgroundSize='cover';prev.textContent='';
    this._b64=null;
  }
}));
function updateNpImgPreview(url){
  var prev=el('np-img-preview');
  if(!prev)return;
  if(url){
    prev.style.backgroundImage='url('+url+')';
    prev.style.backgroundSize='cover';
    prev.style.backgroundPosition='center';
    prev.textContent='';
    var imgEl=el('np-img');if(imgEl)imgEl._b64=null;
  } else {
    prev.style.backgroundImage='none';
    prev.textContent='🍬';
  }
}
function toggleAddProd(){el('add-prod-form').classList.toggle('hidden');}

async function addProd(){
  var brandEl=el('np-brand');var nameEl=el('np-name');
  var brand=brandEl?brandEl.value.trim():'';
  var name=nameEl?nameEl.value.trim():'';
  if(!brand||!name){toast('أدخل البراند والاسم',false);return;}
  var priceEl=el('np-price');var saleEl=el('np-sale');
  var price=priceEl?parseFloat(priceEl.value)||null:null;
  var sale=saleEl?parseFloat(saleEl.value)||null:null;
  var imgEl=el('np-img');
  var img=(imgEl&&imgEl._b64)||(imgEl&&imgEl.value.trim())||null;
  var newP={id:'p'+Date.now(),brand:brand,name:name,price:price,salePrice:sale,
    img:img,inStock:true,active:true,qty:0};
  prods=[...prods,newP];
  await fbSet('hz4_p3_custom','ok');
  await saveProds(prods);
  if(brandEl)brandEl.value='';
  if(nameEl)nameEl.value='';
  if(priceEl)priceEl.value='';
  if(saleEl)saleEl.value='';
  if(imgEl)imgEl.value='';
  toast('تم إضافة المنتج: '+name);
  var form=el('add-prod-form');
  if(form)form.classList.add('hidden');
  renderProducts();
}

        <div style="flex:1"><label class="inp-label">مجاناً</label>

function clearProdImg(pid){
  var inp=el('ep-img-'+pid);
  if(inp){inp.value='';inp._b64=null;}
  var prev=el('ep-img-prev-'+pid);
  if(prev){prev.innerHTML='🍬';prev.style.backgroundImage='none';}
  toast('ستُحذف الصورة عند الحفظ');
}
function handleEpImg(e,pid){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    var inp=el('ep-img-'+pid);
    if(inp){inp.value='';inp._b64=ev.target.result;}
    var prev=el('ep-img-prev-'+pid);
    if(prev){prev.style.backgroundImage='url('+ev.target.result+')';prev.style.backgroundSize='cover';prev.textContent='';}
    toast('تم رفع الصورة — اضغط حفظ لتطبيقها');
  };
  r.readAsDataURL(f);
}
function clearPromo(pid){
  var bEl=el('ep-buy-'+pid);var fEl=el('ep-free-'+pid);
  if(bEl)bEl.value='';if(fEl)fEl.value='';
  toast('تم حذف الحزمة - اضغط حفظ لتطبيق التغيير');
}
async function saveProdEdit(pid){
  var np=prods.map(p=>{
    if(p.id!==pid)return p;
    return{...p,
      brand:el('ep-brand-'+pid).value.trim()||p.brand,
      name:el('ep-name-'+pid).value.trim()||p.name,
      price:parseFloat(el('ep-price-'+pid).value)||p.price,
      salePrice:parseFloat(el('ep-sale-'+pid).value)||null,
      salePrice:parseFloat(el('ep-sale-'+pid)?.value)||null,
      img:(el('ep-img-'+pid)?._b64)||(el('ep-img-'+pid)?.value.trim()||null),
      promoRule:(el('ep-buy-'+pid)?.value&&el('ep-free-'+pid)?.value)?{buyQty:parseInt(el('ep-buy-'+pid).value),freeQty:parseInt(el('ep-free-'+pid).value)}:null,
      inStock:el('ep-stock-'+pid).checked
    };
  });
  await saveProds(np);toast('تم الحفظ');renderProducts();
}

async function archiveProd(pid){
  prods=prods.map(function(p){return p.id===pid?Object.assign({},p,{active:!p.active}):p;});
  await fbSet('hz4_p3',prods);
  renderProducts();
}

async function deleteProd(pid){
  if(!confirm('حذف نهائي؟ لا يمكن التراجع'))return;
  await saveProds(prods.filter(p=>p.id!==pid));
  toast('تم الحذف');renderProducts();
}

      <option value="all">الكل</option>
      <option value="instock">متوفر فقط</option>
      <option value="zero">نفد المخزون</option>
      <option value="infinite">غير محدود</option>
    </select>
  </div>
  <div id="inv-list">${renderInvList(active,'all','')}</div>`;
}

function filterInv(q){
  var filter=el('inv-filter')?el('inv-filter').value:'all';
  var list=prods.filter(function(p){return p.active;});
  if(q)list=list.filter(function(p){return p.name.includes(q)||p.brand.includes(q);});
  if(filter==='instock')list=list.filter(function(p){return (p.qty||0)>0&&(p.qty||0)<9999;});
  else if(filter==='zero')list=list.filter(function(p){return (p.qty||0)===0;});
  else if(filter==='infinite')list=list.filter(function(p){return (p.qty||0)>=9999;});
  el('inv-list').innerHTML=renderInvList(list,filter,q);
}

function renderInvList(list,filter,q){
  if(!list||!list.length)return'<div style="text-align:center;padding:30px;color:var(--text2)">لا توجد منتجات</div>';
  return list.map(function(p){
    var qty=p.qty||0;
    var qtyLabel=qty>=9999?'غير محدود':qty;
    var qtyColor=qty>=9999?'#6B21A8':qty===0?'var(--red)':'#166534';
    var imgEl=p.img
      ?'<img src="'+p.img+'" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0" loading="lazy">'
      :'<div style="width:44px;height:44px;border-radius:8px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🍬</div>';
    return '<div class="card" style="padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">'
      +imgEl
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:700">'+p.name+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">'+p.brand+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;gap:4px">'
      +'<input type="number" value="'+qty+'" min="0" '
      +'style="width:75px;text-align:center;border:1.5px solid '+(qty===0?'var(--red)':qty>=9999?'#DDD6FE':'var(--border)')+';border-radius:8px;padding:7px;font-size:14px;font-weight:700;font-family:Cairo,sans-serif;background:var(--bg);color:'+qtyColor+'" '
      +'onchange="updateQty(\'' +p.id+ '\',this.value)">'
      +'<span style="font-size:9px;color:'+qtyColor+';font-weight:700">'+qtyLabel+'</span>'
      +'</div>'
      +'</div>';
  }).join('');
}

async function addToInventory(){
  var pid=el('inv-add-pid')?el('inv-add-pid').value:'';
  var addQty=parseInt(el('inv-add-qty')?el('inv-add-qty').value:'0')||0;
  if(!pid){toast('اختر المنتج أولاً',false);return;}
  if(!addQty||addQty<=0){toast('أدخل كمية صحيحة',false);return;}
  var p=prods.find(function(x){return x.id===pid;});
  if(!p){toast('المنتج غير موجود',false);return;}
  var newQty=(p.qty||0)+addQty;
  await updateQty(pid,newQty);
  if(el('inv-add-pid'))el('inv-add-pid').value='';
  if(el('inv-add-qty'))el('inv-add-qty').value='';
  toast('تم إضافة '+addQty+' قطعة → الإجمالي: '+newQty);
  filterInv(el('inv-srch')?el('inv-srch').value:'');
}

async function setInventory(){
  var pid=el('inv-add-pid')?el('inv-add-pid').value:'';
  var qty=parseInt(el('inv-add-qty')?el('inv-add-qty').value:'0')||0;
  if(!pid){toast('اختر المنتج أولاً',false);return;}
  await updateQty(pid,qty);
  if(el('inv-add-pid'))el('inv-add-pid').value='';
  if(el('inv-add-qty'))el('inv-add-qty').value='';
  toast('تم تعيين المخزون: '+qty+' قطعة');
  filterInv(el('inv-srch')?el('inv-srch').value:'');
}

async function confirmResetAllQty(){
  if(!confirm('تصفير مخزون جميع المنتجات؟ لا يمكن التراجع'))return;
  await fbSet('hz4_p3',{});
  prods=IP.map(function(ip){return Object.assign({},ip,{qty:0});});
  toast('تم تصفير جميع الكميات');
  renderInv();
}

async function updateQty(pid,val){
  var qty=parseInt(val)||0;
  prods=prods.map(function(p){return p.id===pid?Object.assign({},p,{qty:qty}):p;});
  await fbSet('hz4_p3',prods);
  toast('تم تحديث الكمية: '+qty);
}

function startEditUser(uid){

async function saveUserEdit(uid){
  var name=el('ue-name-'+uid)?.value.trim();
  var role=el('ue-role-'+uid)?.value;

  var newPw=el('ue-pw-'+uid)?.value.trim();

  var nu=users.map(function(u){
    if(u.id!==uid)return u;

async function saveBundle(){

  var items=[];
  prods.filter(p=>p.active).forEach(p=>{
    var inp=el('bq-'+p.id);
    var qty=parseInt(inp?.value)||0;
    if(qty>0)items.push({prodId:p.id,qty});

function applyNamedBundle(bid){
  var b=bundles.find(function(x){return x.id===bid;});

  if(!p){toast('المنتج غير موجود',false);return;}
  if(p.inStock!==false&&(p.qty||0)<=0){
    toast('المخزون صفر لهذا المنتج',false);return;
  }
  var idx=cartItems.findIndex(function(c){return c.prod.id===b.productId;});

    cartItems[idx].free=b.freeQty;

  filterProds(el('nq-srch')?.value||'');

}

function exportInvExcel(){
  var lines=['رقم المنتج,البراند,اسم المنتج,السعر,المخزون'];
  prods.filter(function(p){return p.active;}).forEach(function(p){
    lines.push(p.id+','+p.brand+','+p.name+','+(p.price||0)+','+(p.qty||0));
  });
  var blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='inv_'+today()+'.csv';a.click();
  toast('تم تصدير المخزون');
}

async function importInvExcel(e){
  var file=e.target.files[0];if(!file)return;
  var text=await file.text();
  // Parse CSV (simple)
  var lines=text.split('\n').filter(function(l){return l.trim();});
  var updated=0;
  lines.slice(1).forEach(function(line){
    var cols=line.split(',').map(function(c){return c.replace(/^"|"$/g,'').trim();});
    if(cols.length<5)return;
    var pid=cols[0];var qty=parseInt(cols[4])||0;
    var idx=prods.findIndex(function(p){return p.id===pid;});
    if(idx>=0){prods[idx]=Object.assign({},prods[idx],{qty:qty});updated++;}
  });
  if(updated>0){
    await saveProds(prods);
    toast('تم تحديث '+updated+' منتج من الملف');
    renderInv();
  } else {
    toast('لم يتم التعرف على أي منتجات في الملف',false);
  }
}

      ?'<img src="'+p.img+'" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0">'
      :'<div style="width:44px;height:44px;border-radius:8px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🍬</div>';
    return '<div class="card" style="padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:10px">'
      +imgEl
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:700">'+p.name+'</div>'
      +'<div style="font-size:11px;color:var(--gold-d)">'+p.brand+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<button type="button" style="width:30px;height:30px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);font-size:18px;cursor:pointer;font-weight:700;line-height:1" data-pid="'+p.id+'" data-d="-1" onclick="quickAdjust(this.dataset.pid,-1)">-</button>'
      +'<input type="number" value="'+qVal+'" min="0"'
      +' style="width:70px;text-align:center;border:1.5px solid var(--border);border-radius:6px;padding:6px;font-size:14px;font-weight:700;font-family:Cairo,sans-serif;color:'+qColor+';background:var(--bg)"'
      +' id="qty-'+p.id+'" data-pid="'+p.id+'" onchange="updateQty(this.dataset.pid,this.value)">'
      +'<button type="button" style="width:30px;height:30px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);font-size:18px;cursor:pointer;font-weight:700;line-height:1" data-pid="'+p.id+'" onclick="quickAdjust(this.dataset.pid,1)">+</button>'
      +'</div></div>';
  }).join('');
}

async function quickAdjust(pid,delta){
  var p=prods.find(function(x){return x.id===pid;});
  if(!p)return;
  var newQty=Math.max(0,(p.qty||0)+delta);
  var inp=el('qty-'+pid);
  if(inp)inp.value=newQty;
  await updateQty(pid,newQty);
}

async function syncProductsFromIP(){
  if(!confirm('سيتم تحديث الصور والأسعار من الإكسل مع الحفاظ على الكميات المُدخلة. متابعة؟'))return;
  toast('جار المزامنة...');
  // Match by name+brand to preserve qty even if IDs changed
  var merged=IP.map(function(ip){
    var cur=prods.find(function(p){
      return p.name===ip.name&&p.brand===ip.brand;
    });
    return Object.assign({},ip,{
      qty:cur&&cur.qty>0?cur.qty:ip.qty,
      active:cur?cur.active!==false:true,
      promoRule:cur&&cur.promoRule?cur.promoRule:null
    });
  });
  // Keep custom products (not in IP)
  prods.forEach(function(p){
    if(!IP.find(function(ip){return ip.name===p.name&&ip.brand===p.brand;})){
      merged.push(p);
    }
  });
  prods=merged;
  await fbSet('hz4_p3',merged);
  toast('تم تحديث '+merged.length+' منتج ✅');
}

async function syncQtyOnly(){
  if(!confirm('سيتم تحديث الكميات فقط من الإكسل. متابعة؟'))return;
  toast('جار تحديث الكميات...');
  var ov={};
  IP.forEach(function(ip){if(ip.qty!==0)ov[ip.id]={qty:ip.qty};});
  await fbSet('hz4_p3',ov);
  prods=IP.map(function(ip){return Object.assign({},ip);});
  toast('تم تحديث كميات '+IP.length+' منتج من الإكسل');
}
